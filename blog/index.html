<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230D2545'/%3E%3Ctext x='16' y='23' font-family='Arial Black, Arial, sans-serif' font-weight='900' font-size='17' fill='%23E8A93A' text-anchor='middle'%3EGE%3C/text%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Globus Edge</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0e0e0d;
    --ink-mid: #3d3b35;
    --ink-soft: #7a7870;
    --ink-faint: #b5b3ac;
    --bg: #f5f3ee;
    --bg-card: #eceae4;
    --bg-dark: #0e0e0d;
    --accent: #1a4a2e;
    --accent-mid: #2d6b44;
    --accent-light: #d4e8da;
    --gold: #c8932a;
    --blue: #253C82;
    --rule: rgba(14,14,13,0.12);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 48px;
    background: rgba(245,243,238,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--rule);
  }

  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none;
  }
  .nav-logo img { height: 48px; width: auto; }
  .nav-logo-text {
    font-family: 'Instrument Serif', serif;
    font-size: 20px;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .nav-logo-text span { color: var(--accent-mid); }

  nav a.cta {
    font-size: 13px; font-weight: 500;
    letter-spacing: 0.04em; text-transform: uppercase;
    color: #fff; background: var(--accent);
    padding: 10px 22px; border-radius: 4px;
    text-decoration: none; transition: background 0.2s;
  }
  nav a.cta:hover { background: var(--accent-mid); }

  /* ── PAGE HEADER ── */
  .page-header {
    padding: 140px 48px 64px;
    max-width: 1200px; margin: 0 auto;
  }

  .page-header .section-label {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--accent-mid); margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .page-header .section-label::before {
    content: ''; display: inline-block;
    width: 24px; height: 1px; background: var(--accent-mid);
  }

  .page-header h1 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(40px, 5vw, 64px);
    line-height: 1.08; letter-spacing: -0.03em;
    max-width: 640px; margin-bottom: 20px;
  }
  .page-header h1 em { font-style: italic; color: var(--accent-mid); }

  .page-header p {
    font-size: 18px; font-weight: 300;
    color: var(--ink-mid); max-width: 520px;
    line-height: 1.6;
  }

  /* ── BLOG GRID ── */
  .blog-section {
    padding: 0 48px 96px;
    max-width: 1200px; margin: 0 auto;
  }

  .blog-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }

  /* Featured first post */
  .blog-grid .post-card:first-child {
    grid-column: span 2;
  }

  .post-card {
    background: var(--bg-card);
    border-radius: 6px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: flex; flex-direction: column;
    transition: transform 0.2s, box-shadow 0.2s;
    opacity: 0; transform: translateY(16px);
    transition: opacity 0.5s ease, transform 0.5s ease, box-shadow 0.2s;
  }
  .post-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(14,14,13,0.1);
  }

  .post-card-image {
    width: 100%; aspect-ratio: 16/9;
    background: var(--accent-light);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  .post-card-image img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .post-card-image-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--accent-light) 0%, rgba(26,74,46,0.15) 100%);
  }
  .post-card-image-placeholder svg {
    opacity: 0.3;
  }

  .post-card-body {
    padding: 28px 32px 32px;
    flex: 1; display: flex; flex-direction: column;
  }

  .post-meta {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 14px;
  }
  .post-date {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-faint);
  }
  .post-author {
    font-size: 11px; color: var(--ink-faint);
  }
  .post-author::before {
    content: '·'; margin-right: 16px; color: var(--rule);
  }

  .post-title {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(20px, 2.5vw, 26px);
    line-height: 1.2; letter-spacing: -0.02em;
    margin-bottom: 12px; color: var(--ink);
  }
  .post-card:first-child .post-title {
    font-size: clamp(24px, 3vw, 34px);
  }

  .post-summary {
    font-size: 14px; font-weight: 300;
    color: var(--ink-soft); line-height: 1.65;
    flex: 1; margin-bottom: 20px;
  }

  .post-readmore {
    font-size: 13px; font-weight: 500;
    color: var(--accent-mid);
    display: inline-flex; align-items: center; gap: 6px;
    letter-spacing: 0.02em;
    transition: gap 0.2s;
  }
  .post-card:hover .post-readmore { gap: 10px; }
  .post-readmore::after { content: '→'; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 96px 48px;
    color: var(--ink-soft);
  }
  .empty-state h2 {
    font-family: 'Instrument Serif', serif;
    font-size: 32px; margin-bottom: 12px;
    color: var(--ink-mid);
  }
  .empty-state p { font-size: 16px; font-weight: 300; }

  /* ── LOADING ── */
  .loading-state {
    text-align: center; padding: 96px 48px;
  }
  .loading-dots {
    display: inline-flex; gap: 8px; align-items: center;
  }
  .loading-dots span {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent-mid); opacity: 0.3;
    animation: pulse 1.2s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  /* ── FOOTER ── */
  footer {
    background: var(--bg-dark); color: rgba(245,243,238,0.5);
    padding: 40px 48px;
    font-size: 13px;
    display: flex; align-items: center; justify-content: space-between;
  }
  footer a { color: rgba(245,243,238,0.5); text-decoration: none; }
  footer a:hover { color: #fff; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    nav { padding: 14px 24px; }
    .page-header { padding: 120px 24px 48px; }
    .blog-section { padding: 0 24px 64px; }
    .blog-grid { grid-template-columns: 1fr; }
    .blog-grid .post-card:first-child { grid-column: span 1; }
    footer { flex-direction: column; gap: 12px; text-align: center; }
  }
  @media (max-width: 600px) {
    .post-card-body { padding: 20px 20px 24px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/" class="nav-logo">
    <span class="nav-logo-text">Globus <span>Edge</span></span>
  </a>
  <a href="/#contact" class="cta">Get in Touch</a>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="section-label">Insights &amp; Perspectives</div>
  <h1>The <em>Ecosystem</em><br>Intelligence Blog</h1>
  <p>Thinking on partner-led growth, ISV ecosystems, and the future of channel intelligence.</p>
</div>

<!-- BLOG GRID -->
<div class="blog-section">
  <div id="blogContainer">
    <div class="loading-state">
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <span>© 2025 Globus Edge. All rights reserved.</span>
  <a href="/">← Back to main site</a>
</footer>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }

  // ── Parse front matter from markdown ──
  function parseFrontMatter(text) {
    const match = text.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
    if (!match) return { data: {}, content: text };
    const data = {};
    match[1].split('\n').forEach(line => {
      const [key, ...rest] = line.split(':');
      if (key && rest.length) {
        data[key.trim()] = rest.join(':').trim().replace(/^["']|["']$/g, '');
      }
    });
    return { data, content: match[2].trim() };
  }

  // ── Format date ──
  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    if (isNaN(d)) return dateStr;
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  // ── Fetch post list from GitHub API ──
  // Replace GITHUB_USER and GITHUB_REPO below with your actual values
  const GITHUB_USER = 'globusedge';
  const GITHUB_REPO = 'globusedge-site';
  const POSTS_PATH = 'blog/posts';

  async function loadPosts() {
    const container = document.getElementById('blogContainer');
    try {
      const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${POSTS_PATH}`);
      if (!res.ok) throw new Error('Could not fetch posts');
      const files = await res.json();

      const mdFiles = files.filter(f => f.name.endsWith('.md')).reverse(); // newest first

      if (mdFiles.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h2>No posts yet</h2>
            <p>Check back soon — articles are on their way.</p>
          </div>`;
        return;
      }

      // Fetch each post's content
      const posts = await Promise.all(mdFiles.map(async (file) => {
        const r = await fetch(file.download_url);
        const text = await r.text();
        const { data } = parseFrontMatter(text);
        return {
          slug: file.name.replace('.md', ''),
          title: data.title || 'Untitled',
          date: data.date || '',
          author: data.author || 'Globus Edge',
          summary: data.summary || '',
          thumbnail: data.thumbnail || '',
        };
      }));

      // Render grid
      const grid = document.createElement('div');
      grid.className = 'blog-grid';

      posts.forEach((post, i) => {
        const card = document.createElement('a');
        card.className = 'post-card';
        card.href = `/blog/post.html?slug=${post.slug}`;

        const imgHtml = post.thumbnail
          ? `<div class="post-card-image"><img src="${post.thumbnail}" alt="${post.title}" loading="lazy"></div>`
          : `<div class="post-card-image">
               <div class="post-card-image-placeholder">
                 <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                   <rect x="4" y="10" width="40" height="28" rx="3" stroke="#1a4a2e" stroke-width="2"/>
                   <circle cx="17" cy="21" r="4" stroke="#1a4a2e" stroke-width="2"/>
                   <path d="M4 32l10-8 8 6 8-10 14 12" stroke="#1a4a2e" stroke-width="2" stroke-linejoin="round"/>
                 </svg>
               </div>
             </div>`;

        card.innerHTML = `
          ${imgHtml}
          <div class="post-card-body">
            <div class="post-meta">
              <span class="post-date">${formatDate(post.date)}</span>
              <span class="post-author">${post.author}</span>
            </div>
            <h2 class="post-title">${post.title}</h2>
            ${post.summary ? `<p class="post-summary">${post.summary}</p>` : ''}
            <span class="post-readmore">Read article</span>
          </div>`;

        grid.appendChild(card);
      });

      container.innerHTML = '';
      container.appendChild(grid);

      // Animate cards in
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.style.opacity = '1';
            entry.target.style.transform = 'translateY(0)';
          }
        });
      }, { threshold: 0.05 });

      document.querySelectorAll('.post-card').forEach((el, i) => {
        el.style.transitionDelay = `${i * 0.08}s`;
        observer.observe(el);
      });

    } catch (err) {
      container.innerHTML = `
        <div class="empty-state">
          <h2>Could not load posts</h2>
          <p>Please try refreshing the page.</p>
        </div>`;
      console.error(err);
    }
  }

  loadPosts();
</script>
</body>
</html>
